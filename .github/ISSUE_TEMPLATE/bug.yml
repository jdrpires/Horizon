name: Bug
description: Report a reproducible defect.
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the observed defect.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe the expected behavior.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Describe what happened instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide clear steps to reproduce the defect.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add logs, versions, environment details, or correlation IDs.
