services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api/Dockerfile
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - horizon

  postgres:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_DB: horizon
      POSTGRES_USER: horizon
      POSTGRES_PASSWORD: horizon
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/home/postgres/pgdata/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U horizon -d horizon"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - horizon

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - horizon

volumes:
  postgres-data:
  redis-data:

networks:
  horizon:
    driver: bridge
